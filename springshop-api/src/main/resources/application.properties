spring.application.name=SpringShopAI

# Point to the docker-compose file inside the springshop-api module
spring.docker.compose.file=springshop-api/docker-compose.yml

#spring.datasource.url=jdbc:postgresql://localhost:5432/telusko
#spring.datasource.username=postgres
#spring.datasource.password=12345678

spring.jpa.hibernate.ddl-auto=update

# Set max file size for single file upload (e.g., 100MB)
spring.servlet.multipart.max-file-size=100MB
# Set max request size for total upload (e.g., multiple files in a single request)
spring.servlet.multipart.max-request-size=100MB

# ---- Ollama Configuration ----
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=mistral
spring.ai.ollama.embedding.options.model=nomic-embed-text

spring.sql.init.schema-locations=classpath:init/schema.sql
spring.sql.init.mode=always
spring.main.allow-bean-definition-overriding=true